services:
  - type: web
    name: movil-dev-whatsapp
    runtime: node
    rootDir: whatsapp-service
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/whatsapp/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: WA_SERVICE_PORT
        value: 3001
      - key: WA_AUTO_INIT
        value: true
      - key: WA_RECONNECT_DELAY_MS
        value: 3000
      - key: WA_MAX_RETRIES
        value: 20
      - key: WA_RESET_SESSION_ON_LOGOUT
        value: false
      - key: WA_AUTH_DIR
        value: /var/data/baileys_auth
    disk:
      name: whatsapp-auth
      mountPath: /var/data
      sizeGB: 1
